<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG POC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 1.4rem;
      color: #333;
    }

    #chat-box {
      width: 100%;
      max-width: 700px;
      flex: 1;
      background: white;
      border-radius: 10px;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .message {
      padding: 10px 14px;
      border-radius: 8px;
      max-width: 85%;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .user {
      background: #0084ff;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e9e9eb;
      color: #333;
      align-self: flex-start;
    }

    .loading {
      color: #999;
      font-style: italic;
    }

    #input-row {
      display: flex;
      width: 100%;
      max-width: 700px;
      margin-top: 12px;
      gap: 8px;
    }

    #question {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }

    #question:focus { border-color: #0084ff; }

    button {
      padding: 12px 20px;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button:disabled { background: #aaa; cursor: not-allowed; }

    #ingest-btn {
      background: #28a745;
      margin-top: 8px;
      width: 100%;
      max-width: 700px;
    }
  </style>
</head>
<body>
  <h1>RAG POC — Ask your docs</h1>

  <div id="chat-box"></div>

  <div id="input-row">
    <input id="question" type="text" placeholder="Ask something..." />
    <button id="send-btn" onclick="sendQuestion()">Send</button>
  </div>

  <button id="ingest-btn" onclick="ingest()">Ingest Documents</button>

  <script>
    const API = 'http://localhost:5001/api';

    async function ingest() {
      const btn = document.getElementById('ingest-btn');
      btn.disabled = true;
      btn.textContent = 'Ingesting...';
      try {
        const res = await fetch(`${API}/ingest`, { method: 'POST' });
        const data = await res.json();
        alert(data.message || 'Ingestion complete.');
      } catch (e) {
        alert('Ingestion failed. Is the backend running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingest Documents';
      }
    }

    async function sendQuestion() {
      const input = document.getElementById('question');
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, 'user');
      input.value = '';

      const loadingEl = addMessage('Thinking...', 'bot loading');
      document.getElementById('send-btn').disabled = true;

      try {
        const res = await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        loadingEl.textContent = data.answer;
        loadingEl.className = 'message bot';
      } catch (e) {
        loadingEl.textContent = 'Error reaching backend.';
        loadingEl.className = 'message bot';
      } finally {
        document.getElementById('send-btn').disabled = false;
      }
    }

    function addMessage(text, type) {
      const box = document.getElementById('chat-box');
      const el = document.createElement('div');
      el.className = `message ${type}`;
      el.textContent = text;
      box.appendChild(el);
      box.scrollTop = box.scrollHeight;
      return el;
    }

    document.getElementById('question').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendQuestion();
    });
  </script>
</body>
</html>
